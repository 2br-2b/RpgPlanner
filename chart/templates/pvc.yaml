{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "campaign-manager.fullname" . }}-data
  labels:
    {{- include "campaign-manager.labels" . | nindent 4 }}
  annotations:
    # Prevent Helm from deleting the PVC (and your data) on helm uninstall
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
{{- end }}
