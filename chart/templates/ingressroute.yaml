{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "campaign-manager.fullname" . }}
  labels:
    {{- include "campaign-manager.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "campaign-manager.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    certResolver: {{ .Values.ingressRoute.certResolver }}
{{- end }}
