apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-manager.fullname" . }}
  labels:
    {{- include "campaign-manager.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "campaign-manager.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
