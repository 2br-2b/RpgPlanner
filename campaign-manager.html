<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Campaign Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; min-height: 100dvh; }
    body { -webkit-font-smoothing: antialiased; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel from CDN — no build step needed -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js" crossorigin></script>

  <!--
    CAMPAIGN_API_BASE: override this to point at your backend if it's on a
    different origin (e.g. during local dev: set to "http://localhost:8000/api")
    Default is "/api" which works when frontend + backend are on the same host.
  -->
  <script>
    window.CAMPAIGN_API_BASE = "/api";

    // Make React hooks available as module-level globals for the JSX below
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useCallback = React.useCallback;
    window.useRef = React.useRef;
    window.createContext = React.createContext;
    window.useContext = React.useContext;
    window.useMemo = React.useMemo;
  </script>

  <!-- Load order matters: each file depends on symbols defined before it -->
  <script type="text/babel" data-presets="react" src="js/theme.js"></script>
  <script type="text/babel" data-presets="react" src="js/storage.js"></script>
  <script type="text/babel" data-presets="react" src="js/io.js"></script>
  <script type="text/babel" data-presets="react" src="js/sidebar.js"></script>
  <script type="text/babel" data-presets="react" src="js/editor.js"></script>
  <script type="text/babel" data-presets="react" src="js/flowchart.js"></script>
  <script type="text/babel" data-presets="react" src="js/simulator.js"></script>
  <script type="text/babel" data-presets="react" src="js/settings.js"></script>
  <script type="text/babel" data-presets="react" src="js/app.js"></script>
</body>
</html>
