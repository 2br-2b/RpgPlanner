function FlowchartView({ campaign, onUpdate }) {
  const T = useTheme(); const css = makeCSS(T);
  const svgRef = useRef(null);
  const [dragging, setDragging] = useState(null);
  const [connecting, setConnecting] = useState(null);
  const [selectedEdge, setSelectedEdge] = useState(null); // {from, to}
  const { nodes, edges } = campaign.flowchart;

  const setFC = (fn) => onUpdate(c => ({ ...c, flowchart: fn(c.flowchart) }));

  const addNode = (pageId) => {
    if (nodes.find(n => n.pageId === pageId)) return;
    setFC(fc => ({ ...fc, nodes: [...fc.nodes, { id: uid(), pageId, x: 60 + (nodes.length % 4) * 210, y: 80 + Math.floor(nodes.length / 4) * 130, isStart: false, isEnd: false }] }));
  };
  const removeNode = (nid) => { setSelectedEdge(null); setFC(fc => ({ nodes: fc.nodes.filter(n => n.id !== nid), edges: fc.edges.filter(e => e.from !== nid && e.to !== nid) })); };
  const toggleNodeProp = (nid, prop) => setFC(fc => ({
    ...fc,
    nodes: fc.nodes.map(n => {
      if (n.id !== nid) return prop === "isStart" ? { ...n, isStart: false } : n; // only one start
      return { ...n, [prop]: !n[prop] };
    }),
  }));
  const connectNodes = (a, b) => { if (a === b || edges.find(e => e.from === a && e.to === b)) return; setFC(fc => ({ ...fc, edges: [...fc.edges, { from: a, to: b, label: "", events: [] }] })); };
  const removeEdge = (f, t) => { setSelectedEdge(null); setFC(fc => ({ ...fc, edges: fc.edges.filter(e => !(e.from === f && e.to === t)) })); };
  const updateEdge = (f, t, patch) => setFC(fc => ({ ...fc, edges: fc.edges.map(e => e.from === f && e.to === t ? { ...e, ...patch } : e) }));

  const onMD = (e, nid) => { e.stopPropagation(); const n = nodes.find(x => x.id === nid); setDragging({ nid, sx: e.clientX, sy: e.clientY, ox: n.x, oy: n.y }); };
  const onMM = (e) => { if (!dragging) return; setFC(fc => ({ ...fc, nodes: fc.nodes.map(n => n.id === dragging.nid ? { ...n, x: dragging.ox + e.clientX - dragging.sx, y: dragging.oy + e.clientY - dragging.sy } : n) })); };
  const onMU = () => setDragging(null);

  const getMid = (f, t) => { const n1 = nodes.find(n => n.id === f), n2 = nodes.find(n => n.id === t); if (!n1 || !n2) return { x: 0, y: 0 }; return { x: (n1.x + NW / 2 + n2.x + NW / 2) / 2, y: (n1.y + NH / 2 + n2.y + NH / 2) / 2 }; };
  const getPath = (f, t) => { const n1 = nodes.find(n => n.id === f), n2 = nodes.find(n => n.id === t); if (!n1 || !n2) return ""; const x1 = n1.x + NW / 2, y1 = n1.y + NH / 2, x2 = n2.x + NW / 2, y2 = n2.y + NH / 2; return `M ${x1} ${y1} Q ${(x1 + x2) / 2} ${(y1 + y2) / 2 - 20} ${x2} ${y2}`; };

  const unusedPages = campaign.pages.filter(p => !nodes.find(n => n.pageId === p.id));
  const selEdgeData = selectedEdge ? edges.find(e => e.from === selectedEdge.from && e.to === selectedEdge.to) : null;

  return (
    <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
          <h2 style={{ margin: 0, color: T.accentBright, fontSize: 16, letterSpacing: "0.1em" }}>FLOWCHART</h2>
          <span style={{ fontSize: 10, color: T.textDim }}>drag · ◈ connect · ▶/■ mark start/end · click edge to edit</span>
        </div>
        {unusedPages.length > 0 && (
          <div style={{ marginBottom: 10, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 11, color: T.textDim }}>Add to chart:</span>
            {unusedPages.map(p => <button key={p.id} style={{ ...css.btn(), fontSize: 11 }} onClick={() => addNode(p.id)}>+ {p.name}</button>)}
          </div>
        )}
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: T.radius, overflow: "hidden" }}>
          <svg ref={svgRef} width="100%" height={480} style={{ cursor: dragging ? "grabbing" : "default", display: "block" }}
            onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}>
            <defs>
              <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill={T.accent} />
              </marker>
              <marker id="arr-sel" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill={T.accentBright} />
              </marker>
            </defs>
            <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke={T.border} strokeWidth="0.5" />
            </pattern>
            <rect width="100%" height="100%" fill="url(#g)" />

            {edges.map(edge => {
              const m = getMid(edge.from, edge.to);
              const isSel = selectedEdge?.from === edge.from && selectedEdge?.to === edge.to;
              const hasEvents = (edge.events || []).length > 0;
              return (
                <g key={`${edge.from}-${edge.to}`} style={{ cursor: "pointer" }}
                  onClick={() => setSelectedEdge(isSel ? null : { from: edge.from, to: edge.to })}>
                  <path d={getPath(edge.from, edge.to)} fill="none" stroke={isSel ? T.accentBright : T.accent}
                    strokeWidth={isSel ? 2.5 : 1.5} markerEnd={isSel ? "url(#arr-sel)" : "url(#arr)"}
                    strokeDasharray={hasEvents ? "none" : "4 2"} />
                  <text x={m.x} y={m.y - 4} textAnchor="middle" fill={isSel ? T.accentBright : T.textDim} fontSize={10} fontFamily={T.font}>
                    {edge.label || (hasEvents ? `★ ${(edge.events||[]).length}` : "·")}
                  </text>
                </g>
              );
            })}

            {nodes.map(node => {
              const page = campaign.pages.find(p => p.id === node.pageId); if (!page) return null;
              const isCon = connecting === node.id, isTgt = connecting && connecting !== node.id;
              const projCost = (page.costs || []).reduce((s, c) => s + (Number(c.amount) || 0), 0);
              const projAward = (page.awards || []).reduce((s, a) => s + (Number(a.amount) || 0), 0);
              const borderColor = node.isStart ? T.accentBright : node.isEnd ? T.danger : isCon ? T.accentBright : isTgt ? T.accent : T.border;
              const fillColor = node.isStart ? T.accentDim : node.isEnd ? T.danger + "33" : isCon ? T.accentDim : T.surface2;
              return (
                <g key={node.id} transform={`translate(${node.x},${node.y})`} onMouseDown={e => onMD(e, node.id)} style={{ cursor: dragging?.nid === node.id ? "grabbing" : "grab" }}>
                  <rect width={NW} height={NH} rx={T.radius} fill={fillColor} stroke={borderColor}
                    strokeWidth={node.isStart || node.isEnd || isCon || isTgt ? 2 : 1}
                    style={{ cursor: isTgt ? "crosshair" : "grab" }}
                    onClick={() => { if (connecting && connecting !== node.id) { connectNodes(connecting, node.id); setConnecting(null); } }} />
                  <text x={8} y={15} fill={page.type === "mission" ? T.accentBright : T.textDim} fontSize={9} fontFamily={T.font}>
                    {node.isStart ? "▶ START" : node.isEnd ? "■ END" : page.type === "mission" ? "⬟ MISSION" : "◻ PAGE"}
                  </text>
                  <text x={8} y={33} fill={T.text} fontSize={12} fontFamily={T.font}>{page.name.length > 19 ? page.name.slice(0, 17) + "…" : page.name}</text>
                  {(projCost > 0 || projAward > 0) && (
                    <text x={8} y={52} fill={T.textDim} fontSize={8} fontFamily={T.font}>
                      {projCost > 0 ? `▼${projCost.toLocaleString()}` : ""}{projCost > 0 && projAward > 0 ? " " : ""}{projAward > 0 ? `▲${projAward.toLocaleString()}` : ""}
                    </text>
                  )}
                  {/* ◈ connect */}
                  <text x={NW - 20} y={18} fill={isCon ? T.accentBright : T.textDim} fontSize={12} style={{ cursor: "pointer" }}
                    onClick={e => { e.stopPropagation(); setConnecting(connecting === node.id ? null : node.id); }}>◈</text>
                  {/* ▶ toggle start */}
                  <text x={NW - 20} y={36} fill={node.isStart ? T.accentBright : T.textMuted} fontSize={10} style={{ cursor: "pointer" }}
                    title="Mark as start"
                    onClick={e => { e.stopPropagation(); toggleNodeProp(node.id, "isStart"); }}>▶</text>
                  {/* ■ toggle end */}
                  <text x={NW - 20} y={54} fill={node.isEnd ? T.danger : T.textMuted} fontSize={10} style={{ cursor: "pointer" }}
                    title="Mark as end"
                    onClick={e => { e.stopPropagation(); toggleNodeProp(node.id, "isEnd"); }}>■</text>
                  {/* ✕ remove */}
                  <text x={NW - 36} y={54} fill={T.textMuted} fontSize={10} style={{ cursor: "pointer" }}
                    onClick={e => { e.stopPropagation(); removeNode(node.id); }}>✕</text>
                </g>
              );
            })}

            {connecting && <text x={10} y={472} fill={T.accent} fontSize={11} fontFamily={T.font}>Click target node to connect · ◈ again to cancel</text>}
            {nodes.length === 0 && <text x="50%" y="50%" textAnchor="middle" fill={T.textMuted} fontSize={13} fontFamily={T.font}>Add pages using the buttons above</text>}
          </svg>
        </div>
      </div>

      {/* ── Edge editor panel ── */}
      {selEdgeData && (() => {
        const fromNode = nodes.find(n => n.id === selEdgeData.from);
        const toNode = nodes.find(n => n.id === selEdgeData.to);
        const fromPage = campaign.pages.find(p => p.id === fromNode?.pageId);
        const toPage = campaign.pages.find(p => p.id === toNode?.pageId);
        return (
          <div style={{ width: 300, flexShrink: 0, background: T.surface, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 12, color: T.accentBright, fontWeight: "bold" }}>EDGE</span>
              <button style={{ ...css.btn("danger"), padding: "2px 6px", fontSize: 10 }} onClick={() => removeEdge(selEdgeData.from, selEdgeData.to)}>Remove edge</button>
            </div>
            <div style={{ fontSize: 10, color: T.textDim, marginBottom: 8 }}>
              {fromPage?.name || "?"} → {toPage?.name || "?"}
            </div>
            <div style={{ fontSize: 10, color: T.textDim, marginBottom: 4 }}>CONDITION / LABEL</div>
            <input style={{ ...css.input, fontSize: 11, marginBottom: 12 }}
              placeholder="e.g. 'Win streak ≥ 3' or leave blank"
              value={selEdgeData.label || ""}
              onChange={e => updateEdge(selEdgeData.from, selEdgeData.to, { label: e.target.value })} />
            <EdgeEventEditor
              events={selEdgeData.events || []}
              onChange={evts => updateEdge(selEdgeData.from, selEdgeData.to, { events: evts })}
              T={T} css={css} />
            <button style={{ ...css.btn(), fontSize: 10, width: "100%", marginTop: 12 }} onClick={() => setSelectedEdge(null)}>Close ✕</button>
          </div>
        );
      })()}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SIMULATOR
// ═══════════════════════════════════════════════════════════════════════════════

function randBetween(min, max) {
  const lo = Math.min(min, max), hi = Math.max(min, max);
  return lo === hi ? lo : lo + Math.random() * (hi - lo);
}

function runSimulation(campaign, startingCBills, runs) {
  const { nodes, edges } = campaign.flowchart;
  const startNode = nodes.find(n => n.isStart);
  if (!startNode) return { error: "No start node marked. Click ▶ on a node in the flowchart." };

  const results = [];

  for (let i = 0; i < runs; i++) {
    let cbills = startingCBills;
    let keywords = new Set();
    let path = [];
    let currentNodeId = startNode.id;
    let steps = 0;
    const MAX_STEPS = 60; // prevent infinite loops

    while (currentNodeId && steps < MAX_STEPS) {
      steps++;
      const node = nodes.find(n => n.id === currentNodeId);
      if (!node) break;

      const page = campaign.pages.find(p => p.id === node.pageId);
      path.push(page?.name || "?");

      // Apply base mission costs/awards
      if (page) {
        const baseCost = (page.costs || []).reduce((s, c) => s + (Number(c.amount) || 0), 0);
        const baseAward = (page.awards || []).reduce((s, a) => s + (Number(a.amount) || 0), 0);
        cbills += baseAward - baseCost;
      }

      if (node.isEnd) break;

      // Find outgoing edges
      const outEdges = edges.filter(e => e.from === currentNodeId);
      if (outEdges.length === 0) break;

      // Pick next edge — random weighted by equal probability among reachable edges
      // Future: could weight edges differently; for now uniform random
      const nextEdge = outEdges[Math.floor(Math.random() * outEdges.length)];

      // Apply edge events
      for (const ev of (nextEdge.events || [])) {
        if (ev.requiresKeyword && !keywords.has(ev.requiresKeyword)) continue;
        if (Math.random() * 100 > ev.probability) continue;
        const cost = randBetween(ev.costMin || 0, ev.costMax || 0);
        const award = randBetween(ev.awardMin || 0, ev.awardMax || 0);
        cbills += award - cost;
        if (ev.grantsKeyword) keywords.add(ev.grantsKeyword);
      }

      currentNodeId = nextEdge.to;
    }

    results.push({ cbills: Math.round(cbills), path, keywords: [...keywords] });
  }

  // Aggregate
  const finalCBills = results.map(r => r.cbills).sort((a, b) => a - b);
  const mean = Math.round(finalCBills.reduce((s, v) => s + v, 0) / runs);
  const median = finalCBills[Math.floor(runs / 2)];
  const p10 = finalCBills[Math.floor(runs * 0.1)];
  const p90 = finalCBills[Math.floor(runs * 0.9)];
  const min = finalCBills[0];
  const max = finalCBills[runs - 1];

  // Path frequency
  const pathCounts = {};
  results.forEach(r => { const key = r.path.join(" → "); pathCounts[key] = (pathCounts[key] || 0) + 1; });
  const topPaths = Object.entries(pathCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // Keyword frequency
  const kwCounts = {};
  results.forEach(r => r.keywords.forEach(kw => { kwCounts[kw] = (kwCounts[kw] || 0) + 1; }));
  const topKeywords = Object.entries(kwCounts).sort((a, b) => b[1] - a[1]).slice(0, 12);

  // Distribution buckets (10 buckets)
  const bucketCount = 12;
  const bucketSize = Math.max(1, Math.ceil((max - min) / bucketCount));
  const buckets = [];
  for (let b = 0; b < bucketCount; b++) {
    const lo = min + b * bucketSize;
    const hi = lo + bucketSize;
    buckets.push({ lo, hi, count: finalCBills.filter(v => v >= lo && v < hi).length });
  }
  // Add the last value to the last bucket
  if (buckets.length > 0) buckets[buckets.length - 1].count += finalCBills.filter(v => v >= buckets[buckets.length-1].hi).length;

  return { mean, median, p10, p90, min, max, topPaths, topKeywords, buckets, runs };
}

function SimulatorView({ campaign }) {
  const T = useTheme(); const css = makeCSS(T);
  const [startCBills, setStartCBills] = useState(10000000);
  const [runCount, setRunCount] = useState(100);
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);

  const { nodes } = campaign.flowchart;
  const startNode = nodes.find(n => n.isStart);
  const endNodes = nodes.find(n => n.isEnd);

  const run = () => {
    setRunning(true);
    // Defer to next tick so loading state renders
    setTimeout(() => {
      const r = runSimulation(campaign, startCBills, runCount);
      setResult(r);
      setRunning(false);
    }, 10);
  };

  const fmt = (n) => {
    if (n === undefined || n === null) return "—";
    return (n >= 0 ? "" : "-") + Math.abs(Math.round(n)).toLocaleString();
  };

  const statCard = (label, value, color) => (
    <div style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: "10px 14px", textAlign: "center" }}>
      <div style={{ fontSize: 9, color: T.textDim, letterSpacing: "0.08em", marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 16, fontWeight: "bold", color: color || T.accentBright }}>{fmt(value)}</div>
    </div>
  );

  return (
    <div style={{ maxWidth: 820 }}>
      <h2 style={{ margin: "0 0 4px", color: T.accentBright, fontSize: 16, letterSpacing: "0.1em" }}>CAMPAIGN SIMULATOR</h2>
      <p style={{ margin: "0 0 20px", fontSize: 12, color: T.textDim }}>
        Runs N random campaigns through your flowchart and projects financial outcomes.
        Mark a ▶ start and ■ end node in the Flowchart view first.
      </p>

      {!startNode && (
        <div style={{ background: T.warn + "22", border: `1px solid ${T.warn}`, borderRadius: T.radius, padding: 12, marginBottom: 16, fontSize: 12, color: T.warn }}>
          ⚠ No start node set. Go to Flowchart and click ▶ on the first mission node.
        </div>
      )}
      {startNode && !endNodes && (
        <div style={{ background: T.textDim + "22", border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 10, marginBottom: 16, fontSize: 11, color: T.textDim }}>
          Tip: mark ■ end nodes so simulations know where to stop. Without them, paths end at nodes with no outgoing edges.
        </div>
      )}

      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div style={{ flex: "0 0 200px" }}>
          <div style={{ fontSize: 10, color: T.textDim, marginBottom: 4, letterSpacing: "0.08em" }}>STARTING C-BILLS</div>
          <input type="number" style={{ ...css.input }} value={startCBills} onChange={e => setStartCBills(Number(e.target.value))} />
        </div>
        <div style={{ flex: "0 0 120px" }}>
          <div style={{ fontSize: 10, color: T.textDim, marginBottom: 4, letterSpacing: "0.08em" }}>SIMULATIONS</div>
          <select style={{ ...css.input }} value={runCount} onChange={e => setRunCount(Number(e.target.value))}>
            <option value={10}>10</option>
            <option value={50}>50</option>
            <option value={100}>100</option>
            <option value={500}>500</option>
            <option value={1000}>1000</option>
          </select>
        </div>
        <button style={{ ...css.btn("primary"), padding: "8px 20px", fontSize: 13, opacity: (!startNode || running) ? 0.5 : 1 }}
          disabled={!startNode || running} onClick={run}>
          {running ? "Running…" : `▶ Run ${runCount} Simulations`}
        </button>
      </div>

      {result?.error && (
        <div style={{ color: T.danger, fontSize: 13, padding: 12, background: T.danger + "22", borderRadius: T.radius }}>{result.error}</div>
      )}

      {result && !result.error && (
        <div>
          {/* Stats row */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: 8, marginBottom: 20 }}>
            {statCard("MEAN", result.mean)}
            {statCard("MEDIAN", result.median)}
            {statCard("10th %ile", result.p10, result.p10 < 0 ? T.danger : T.textDim)}
            {statCard("90th %ile", result.p90, T.accent)}
            {statCard("WORST", result.min, result.min < 0 ? T.danger : T.textDim)}
            {statCard("BEST", result.max, T.accent)}
          </div>

          {/* Distribution bar chart */}
          <div style={{ ...css.section, marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.08em", marginBottom: 12 }}>DISTRIBUTION (final C-Bills)</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 80 }}>
              {result.buckets.map((b, i) => {
                const maxCount = Math.max(...result.buckets.map(x => x.count));
                const h = maxCount === 0 ? 0 : Math.max(4, (b.count / maxCount) * 76);
                const isNeg = b.lo < 0;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }} title={`${b.lo.toLocaleString()} – ${b.hi.toLocaleString()}: ${b.count} runs`}>
                    <div style={{ width: "100%", height: h, background: isNeg ? T.danger : T.accent, borderRadius: "2px 2px 0 0", opacity: 0.8 }} />
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: T.textMuted, marginTop: 4 }}>
              <span>{fmt(result.min)}</span>
              <span>{fmt(result.mean)} avg</span>
              <span>{fmt(result.max)}</span>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16, marginBottom: 16 }}>
            {/* Top paths */}
            <div style={css.section}>
              <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.08em", marginBottom: 10 }}>TOP PATHS</div>
              {result.topPaths.map(([path, count]) => (
                <div key={path} style={{ display: "flex", gap: 8, marginBottom: 6, alignItems: "flex-start" }}>
                  <div style={{ flex: 1, fontSize: 11, color: T.text, lineHeight: 1.4 }}>{path}</div>
                  <div style={{ flexShrink: 0, fontSize: 11, color: T.accentBright, fontWeight: "bold" }}>
                    {count}× <span style={{ color: T.textDim, fontWeight: "normal" }}>({Math.round(count / result.runs * 100)}%)</span>
                  </div>
                </div>
              ))}
              {result.topPaths.length === 0 && <div style={{ fontSize: 11, color: T.textMuted }}>No paths recorded.</div>}
            </div>

            {/* Keywords earned */}
            <div style={css.section}>
              <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.08em", marginBottom: 10 }}>KEYWORDS EARNED</div>
              {result.topKeywords.map(([kw, count]) => (
                <div key={kw} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ ...css.tag }}>{kw}</span>
                  <span style={{ fontSize: 11, color: T.textDim }}>
                    {count}× ({Math.round(count / result.runs * 100)}%)
                  </span>
                </div>
              ))}
              {result.topKeywords.length === 0 && <div style={{ fontSize: 11, color: T.textMuted }}>No keywords earned. Add keyword grants to edge events.</div>}
            </div>
          </div>

          <div style={{ fontSize: 10, color: T.textMuted, borderTop: `1px solid ${T.border}`, paddingTop: 8 }}>
            {result.runs} simulations · branching paths chosen randomly (uniform) · edge event probabilities applied per-event
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SETTINGS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function SettingsView({ campaign, onUpdate, onClear }) {
  const T = useTheme(); const css = makeCSS(T);
  const [confirmClear, setConfirmClear] = useState(false);

  const isMobile = useIsMobile();
  const Row = ({ label, hint, children }) => (
    <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", alignItems: "flex-start", gap: isMobile ? 8 : 16, padding: "14px 0", borderBottom: `1px solid ${T.border}` }}>
      <div style={{ flex: isMobile ? "none" : "0 0 200px" }}>
        <div style={{ fontSize: 13, color: T.text, marginBottom: 3 }}>{label}</div>
        {hint && <div style={{ fontSize: 10, color: T.textDim }}>{hint}</div>}
      </div>
      <div style={{ flex: 1, width: "100%" }}>{children}</div>
    </div>
  );

  const [guidCopied, setGuidCopied] = useState(false);
  const [adoptGuid, setAdoptGuid] = useState("");
  const [adoptDone, setAdoptDone] = useState(false);

  const copyShareLink = () => {
    const url = `${window.location.origin}${window.location.pathname}?guid=${SESSION_GUID}`;
    navigator.clipboard.writeText(url).then(() => { setGuidCopied(true); setTimeout(() => setGuidCopied(false), 2000); });
  };

  const copyGuidOnly = () => {
    navigator.clipboard.writeText(SESSION_GUID).then(() => { setGuidCopied(true); setTimeout(() => setGuidCopied(false), 2000); });
  };

  const doAdoptGuid = () => {
    const g = adoptGuid.trim();
    if (!/^[0-9a-f-]{36}$/.test(g)) return;
    localStorage.setItem("campaign-manager-guid", g);
    setAdoptDone(true);
    setTimeout(() => window.location.reload(), 1200);
  };

  return (
    <div style={{ maxWidth: 680 }}>
      <h2 style={{ margin: "0 0 20px", color: T.accentBright, fontSize: 16, letterSpacing: "0.1em" }}>SETTINGS</h2>

      {/* Sync / GUID */}
      <div style={{ ...css.section, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.1em", marginBottom: 12 }}>SYNC &amp; SHARING</div>
        <Row label="Your sync ID" hint="This browser's GUID. All saves go to this ID on the server. Share to sync across devices.">
          <div style={{ fontFamily: "monospace", fontSize: 11, color: T.accentBright, background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: "6px 10px", marginBottom: 8, wordBreak: "break-all" }}>
            {SESSION_GUID}
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            <button style={{ ...css.btn("primary"), fontSize: 11 }} onClick={copyShareLink}>
              {guidCopied ? "✓ Copied!" : "Copy share link"}
            </button>
            <button style={{ ...css.btn(), fontSize: 11 }} onClick={copyGuidOnly}>Copy ID only</button>
          </div>
        </Row>
        <Row label="Adopt a sync ID" hint="Paste another device's GUID to load that campaign. Page will reload.">
          <div style={{ display: "flex", gap: 6 }}>
            <input style={{ ...css.input, fontSize: 11, fontFamily: "monospace" }}
              placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
              value={adoptGuid} onChange={e => setAdoptGuid(e.target.value)} />
            <button style={{ ...css.btn(adoptDone ? "primary" : "default"), fontSize: 11, flexShrink: 0 }}
              onClick={doAdoptGuid} disabled={adoptDone}>
              {adoptDone ? "Reloading…" : "Adopt"}
            </button>
          </div>
        </Row>
      </div>

      {/* Campaign info */}
      <div style={{ ...css.section, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.1em", marginBottom: 12 }}>CAMPAIGN</div>

        <Row label="Campaign name" hint="Shown in the topbar and export filenames.">
          <input style={css.input} value={campaign.name} onChange={e => onUpdate(c => ({ ...c, name: e.target.value }))} />
        </Row>

        <Row label="Description" hint="Optional. Exported to Markdown output.">
          <textarea style={{ ...css.textarea, minHeight: 80 }}
            value={campaign.description || ""}
            onChange={e => onUpdate(c => ({ ...c, description: e.target.value }))}
            placeholder="Campaign overview, setting, notes for the GM…" />
        </Row>

        <Row label="Default new page type" hint="Pre-selects the type when adding pages from the sidebar.">
          <select style={{ ...css.input, width: "auto" }}
            value={campaign.defaultPageType || "mission"}
            onChange={e => onUpdate(c => ({ ...c, defaultPageType: e.target.value }))}>
            <option value="mission">Mission</option>
            <option value="free">Free Page</option>
          </select>
        </Row>
      </div>

      {/* Display */}
      <div style={{ ...css.section, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.1em", marginBottom: 12 }}>DISPLAY</div>

        <Row label="Theme" hint="Also accessible from the topbar dropdown.">
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {Object.entries(THEMES).map(([key, theme]) => (
              <div key={key}
                style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 10px", borderRadius: theme.radius, border: `1px solid ${campaign.theme === key ? theme.accentBright : T.border}`, background: campaign.theme === key ? T.surface2 : "transparent", cursor: "pointer", fontFamily: theme.font, fontSize: 12, color: campaign.theme === key ? theme.accentBright : T.textDim }}
                onClick={() => onUpdate(c => ({ ...c, theme: key }))}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: theme.accent, flexShrink: 0 }} />
                {theme.label}
              </div>
            ))}
          </div>
        </Row>

        <Row label="Show projected costs in outline" hint="Show cost/award totals on mission cards in the outline view.">
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
            <input type="checkbox"
              checked={campaign.showCostsInOutline !== false}
              onChange={e => onUpdate(c => ({ ...c, showCostsInOutline: e.target.checked }))}
              style={{ accentColor: T.accent, width: 14, height: 14 }} />
            <span style={{ fontSize: 12, color: T.textDim }}>Enabled</span>
          </label>
        </Row>
      </div>

      {/* Stats */}
      <div style={{ ...css.section, marginBottom: 24 }}>
        <div style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.1em", marginBottom: 12 }}>CAMPAIGN STATS</div>
        {(() => {
          const missions = campaign.pages.filter(p => p.type === "mission");
          const freePages = campaign.pages.filter(p => p.type === "free");
          const allTags = [...new Set(campaign.pages.flatMap(p => p.tags || []))];
          const totalCost = missions.reduce((s, p) => s + (p.costs || []).reduce((a, c) => a + (Number(c.amount) || 0), 0), 0);
          const totalAward = missions.reduce((s, p) => s + (p.awards || []).reduce((a, c) => a + (Number(c.amount) || 0), 0), 0);
          return (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 12 }}>
              {[
                { label: "Total pages", value: campaign.pages.length },
                { label: "Missions", value: missions.length },
                { label: "Free pages", value: freePages.length },
                { label: "Unique tags", value: allTags.length },
                { label: "Flowchart nodes", value: campaign.flowchart.nodes.length },
                { label: "Flowchart edges", value: campaign.flowchart.edges.length },
                { label: "Projected costs", value: totalCost > 0 ? totalCost.toLocaleString() : "—" },
                { label: "Projected awards", value: totalAward > 0 ? totalAward.toLocaleString() : "—" },
              ].map(({ label, value }) => (
                <div key={label} style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, color: T.textDim, letterSpacing: "0.06em", marginBottom: 4 }}>{label.toUpperCase()}</div>
                  <div style={{ fontSize: 18, color: T.accentBright, fontWeight: "bold" }}>{value}</div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>

      {/* Danger zone */}
      <div style={{ ...css.section, borderColor: T.danger }}>
        <div style={{ fontSize: 11, color: T.danger, fontWeight: "bold", letterSpacing: "0.1em", marginBottom: 12 }}>DANGER ZONE</div>
        <Row label="Clear all data" hint="Deletes all pages, schema, and flowchart. Creates a fresh campaign. Cannot be undone.">
          {confirmClear
            ? (
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 11, color: T.danger }}>Are you sure? This cannot be undone.</span>
                <button style={css.btn("danger")} onClick={() => { onClear(); setConfirmClear(false); }}>Yes, clear everything</button>
                <button style={css.btn()} onClick={() => setConfirmClear(false)}>Cancel</button>
              </div>
            )
            : <button style={css.btn("danger")} onClick={() => setConfirmClear(true)}>Clear campaign data…</button>
          }
        </Row>
      </div>
    </div>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
