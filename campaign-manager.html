const ThemeCtx = createContext(THEMES.tactical);
const useTheme = () => useContext(ThemeCtx);

// ─── Mobile detection ─────────────────────────────────────────────────────────
function useIsMobile() {
  const [mobile, setMobile] = useState(() => typeof window !== "undefined" && window.innerWidth < 640);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 640);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mobile;
}

function makeCSS(T) {
  return {
    app: { fontFamily: T.font, background: T.bg, color: T.text, minHeight: "100vh", display: "flex", flexDirection: "column" },
    topbar: { background: T.surface, borderBottom: `1px solid ${T.border}`, padding: "0 16px", display: "flex", alignItems: "center", gap: 10, height: 48, flexShrink: 0 },
    body: { display: "flex", flex: 1, overflow: "hidden" },
    sidebar: { width: 240, background: T.surface, borderRight: `1px solid ${T.border}`, display: "flex", flexDirection: "column", overflow: "hidden", flexShrink: 0 },
    main: { flex: 1, overflow: "auto", padding: 24 },
    btn: (v = "default") => ({
      background: v === "primary" ? T.accent : v === "danger" ? T.danger : T.surface2,
      color: v === "primary" && (T.label === "Material Light") ? "#fff" : T.text,
      border: `1px solid ${v === "primary" ? T.accentDim : T.border}`,
      borderRadius: T.radius, padding: "4px 10px", cursor: "pointer",
      fontFamily: T.font, fontSize: 12, transition: "all 0.15s",
    }),
    input: { background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, color: T.text, padding: "5px 8px", fontFamily: T.font, fontSize: 13, outline: "none", width: "100%" },
    textarea: { background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, color: T.text, padding: "8px", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", width: "100%", resize: "vertical", lineHeight: 1.6 },
    label: { fontSize: 10, color: T.textDim, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4, display: "block" },
    section: { background: T.surface, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 16, marginBottom: 16 },
    tag: { background: T.tag, color: T.tagText, border: `1px solid ${T.tagBorder}`, borderRadius: T.radius, padding: "1px 7px", fontSize: 10, letterSpacing: "0.05em", textTransform: "uppercase" },
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// MARKDOWN RENDERER
// ═══════════════════════════════════════════════════════════════════════════════
function renderMarkdown(text, T) {
  if (!text) return "";
  const t = T || THEMES.tactical;
  let html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:4px;margin:8px 0;" />')
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, `<code style="background:${t.surface2};padding:2px 6px;border-radius:3px;font-family:monospace;font-size:0.9em;">$1</code>`)
    .replace(/^### (.+)$/gm, `<h3 style="color:${t.textDim};margin:12px 0 6px;font-size:1em;">$1</h3>`)
    .replace(/^## (.+)$/gm, `<h2 style="color:${t.accent};margin:14px 0 8px;font-size:1.1em;">$1</h2>`)
    .replace(/^# (.+)$/gm, `<h1 style="color:${t.accentBright};margin:16px 0 10px;font-size:1.3em;">$1</h1>`)
    .replace(/^> (.+)$/gm, `<blockquote style="border-left:3px solid ${t.accentDim};padding-left:12px;color:${t.textDim};margin:8px 0;">$1</blockquote>`)
    .replace(/^\s*[-*] (.+)$/gm, '<li style="margin:3px 0;padding-left:8px;">$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li style="margin:3px 0;padding-left:8px;list-style-type:decimal;">$1</li>')
    .replace(/^---$/gm, `<hr style="border:none;border-top:1px solid ${t.border};margin:16px 0;" />`)
    .replace(/\n\n/g, "</p><p>").replace(/\n/g, "<br/>");
  html = html.replace(/(<li[^>]*>.*?<\/li>(?:<br\/>)*)+/g, (m) => `<ul style="padding-left:20px;margin:6px 0;">${m.replace(/<br\/>/g, "")}</ul>`);
  return `<p style="margin:0;line-height:1.7;">${html}</p>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// STORAGE — GUID-based REST sync
// ═══════════════════════════════════════════════════════════════════════════════

// GUID lives in localStorage so it survives page reloads on the same browser.
// Share the URL ?guid=<value> to sync to another device.
function getOrCreateGuid() {
  // Check URL first — allows ?guid=xxx to adopt a shared GUID
  const params = new URLSearchParams(window.location.search);
  const urlGuid = params.get("guid");
  if (urlGuid && /^[0-9a-f-]{36}$/.test(urlGuid)) {
    localStorage.setItem("campaign-manager-guid", urlGuid);
    // Clean the URL without reloading
    const clean = window.location.pathname + window.location.hash;
    window.history.replaceState({}, "", clean);
    return urlGuid;
  }
  let g = localStorage.getItem("campaign-manager-guid");
  if (!g) {
    g = crypto.randomUUID();
    localStorage.setItem("campaign-manager-guid", g);
  }
  return g;
}

// This is called once at module load so it's stable for the session
const SESSION_GUID = getOrCreateGuid();

const API_BASE = window.CAMPAIGN_API_BASE || "/api";

async function loadData() {
  try {
    const r = await fetch(`${API_BASE}/campaign/${SESSION_GUID}`);
    if (r.status === 404) return null;
    if (!r.ok) throw new Error(r.status);
    const json = await r.json();
    return json.data || null;
  } catch (e) {
    console.warn("Load failed, falling back to localStorage:", e);
    try {
      const local = localStorage.getItem("campaign-manager-local");
      return local ? JSON.parse(local) : null;
    } catch { return null; }
  }
}

async function saveData(data) {
  // Always write to localStorage as a local backup
  try { localStorage.setItem("campaign-manager-local", JSON.stringify(data)); } catch {}
  // Then sync to server
  try {
    await fetch(`${API_BASE}/campaign/${SESSION_GUID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data }),
    });
  } catch (e) { console.warn("Remote save failed (offline?):", e); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════════════════════════════════
const uid = () => crypto.randomUUID();

// ─── Schema versioning ────────────────────────────────────────
// v1: original (no version field)
// v2: edges gain .events[], nodes gain .isStart/.isEnd
const SCHEMA_VERSION = 2;

function migrateCampaign(data) {
  const v = data.schemaVersion || 1;
  if (v === SCHEMA_VERSION) return data;
  let d = { ...data };

  // v1 → v2: add events arrays to edges, isStart/isEnd to nodes
  if (v < 2) {
    d = {
      ...d,
      flowchart: {
        nodes: (d.flowchart?.nodes || []).map(n => ({ isStart: false, isEnd: false, ...n })),
        edges: (d.flowchart?.edges || []).map(e => ({ events: [], ...e })),
      },
    };
  }

  return { ...d, schemaVersion: SCHEMA_VERSION };
}

// Pick materialLight/Dark based on OS preference, used for first-time defaults
function preferredTheme() {
  if (typeof window !== "undefined" && window.matchMedia?.("(prefers-color-scheme: dark)").matches) return "materialDark";
  return "materialLight";
}

function defaultCampaign() {
  return {
    id: uid(), name: "New Campaign", theme: preferredTheme(),
    sectionSchema: [
      { id: uid(), name: "Overview", subheaders: ["Background", "Objectives"] },
      { id: uid(), name: "Setup", subheaders: ["Deployment", "Special Rules"] },
      { id: uid(), name: "Rewards", subheaders: ["C-Bills", "XP", "Salvage"] },
    ],
    schemaVersion: SCHEMA_VERSION,
    pages: [], flowchart: { nodes: [], edges: [] },
  };
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════════════════════
function exportJSON(campaign) {
  const stamped = { ...campaign, schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(stamped, null, 2)], { type: "application/json" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: `${stamped.name.replace(/\s+/g, "_")}.campaign.json` });
  a.click(); URL.revokeObjectURL(a.href);
}

function exportMarkdown(campaign) {
  const lines = [`# ${campaign.name}`, `_Campaign export — ${new Date().toLocaleDateString()}_\n`];
  for (const page of campaign.pages) {
    lines.push(`---\n## ${page.name}`);
    lines.push(`**Type:** ${page.type}${page.tags?.length ? `  |  **Tags:** ${page.tags.join(", ")}` : ""}\n`);
    if (page.type === "mission") {
      for (const sec of campaign.sectionSchema) {
        const content = page.sections?.[sec.id];
        lines.push(`### ${sec.name}`);
        lines.push(content ? content.replace(/!\[[^\]]*\]\(data:[^)]+\)/g, "[image]") : "_No content_");
        lines.push("");
      }
      const costs = page.costs || [], awards = page.awards || [];
      if (costs.length || awards.length) {
        lines.push("### Costs & Awards");
        costs.forEach(c => lines.push(`- Cost: ${c.label} — ${Number(c.amount).toLocaleString()} C-Bills`));
        awards.forEach(a => lines.push(`- Award: ${a.label} — ${Number(a.amount).toLocaleString()} C-Bills`));
        const net = awards.reduce((s, a) => s + Number(a.amount), 0) - costs.reduce((s, c) => s + Number(c.amount), 0);
        lines.push(`- **Net:** ${net.toLocaleString()} C-Bills\n`);
      }
    } else {
      lines.push(page.content ? page.content.replace(/!\[[^\]]*\]\(data:[^)]+\)/g, "[image]") : "_No content_");
      lines.push("");
    }
  }
  if (campaign.flowchart.edges.length) {
    lines.push("---\n## Flowchart");
    for (const edge of campaign.flowchart.edges) {
      const fn = campaign.flowchart.nodes.find(n => n.id === edge.from);
      const tn = campaign.flowchart.nodes.find(n => n.id === edge.to);
      const fp = campaign.pages.find(p => p.id === fn?.pageId);
      const tp = campaign.pages.find(p => p.id === tn?.pageId);
      if (fp && tp) lines.push(`- **${fp.name}** → **${tp.name}**${edge.label ? ` _(${edge.label})_` : ""}`);
    }
  }
  const blob = new Blob([lines.join("\n")], { type: "text/markdown" });
  const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: `${campaign.name.replace(/\s+/g, "_")}.campaign.md` });
  a.click(); URL.revokeObjectURL(a.href);
}

function validateImport(data) {
  if (typeof data !== "object" || !data) return "Not an object";
  if (typeof data.name !== "string") return "Missing name";
  if (!Array.isArray(data.sectionSchema)) return "Missing sectionSchema";
  if (!Array.isArray(data.pages)) return "Missing pages";
  const v = data.schemaVersion || 1;
  if (v > SCHEMA_VERSION) return `Saved with a newer version (v${v}). Update the app to import.`;
  return null;
}

// Run before importing — normalises old saves to current shape
function prepareImport(data) {
  return migrateCampaign(data);
}

// ═══════════════════════════════════════════════════════════════════════════════
// IMPORT/EXPORT MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function ImportExportModal({ campaign, onImport, onClose }) {
  const T = useTheme();
  const css = makeCSS(T);
  const [importError, setImportError] = useState("");
  const [importPreview, setImportPreview] = useState(null);
  const fileRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const err = validateImport(data);
        if (err) { setImportError(err); setImportPreview(null); return; }
        setImportError(""); setImportPreview(data);
      } catch { setImportError("Invalid JSON"); setImportPreview(null); }
    };
    reader.readAsText(file); e.target.value = "";
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 24, width: 480, maxWidth: "90vw", fontFamily: T.font }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
          <span style={{ fontWeight: "bold", color: T.accentBright, letterSpacing: "0.1em", fontSize: 14 }}>EXPORT / IMPORT</span>
          <div style={{ flex: 1 }} />
          <button style={css.btn()} onClick={onClose}>✕</button>
        </div>

        <div style={css.label}>Export</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
          <button style={{ ...css.btn("primary"), flex: 1 }} onClick={() => exportJSON(campaign)}>⬇ JSON (structured)</button>
          <button style={{ ...css.btn(), flex: 1 }} onClick={() => exportMarkdown(campaign)}>⬇ Markdown (readable)</button>
        </div>
        <div style={{ fontSize: 10, color: T.textDim, marginBottom: 20 }}>JSON includes all data incl. images. Markdown strips base64 images to [image] placeholders.</div>

        <div style={{ borderTop: `1px solid ${T.border}`, marginBottom: 16 }} />

        <div style={css.label}>Import JSON</div>
        <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleFile} />
        <button style={{ ...css.btn(), width: "100%", marginBottom: 8 }} onClick={() => fileRef.current?.click()}>⬆ Choose .json file…</button>
        {importError && <div style={{ color: T.danger, fontSize: 11, marginBottom: 8 }}>✕ {importError}</div>}
        {importPreview && (
          <>
            <div style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 10, marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: T.textDim, marginBottom: 4 }}>Ready to import:</div>
              <div style={{ fontSize: 13, color: T.accentBright, fontWeight: "bold" }}>{importPreview.name}</div>
              <div style={{ fontSize: 11, color: T.textDim }}>{importPreview.pages.length} pages · {importPreview.sectionSchema.length} sections</div>
              <div style={{ fontSize: 10, color: T.danger, marginTop: 6 }}>⚠ This will replace your current campaign data.</div>
            </div>
            <button style={{ ...css.btn("danger"), width: "100%" }}
              onClick={() => { onImport(prepareImport({ ...importPreview, theme: importPreview.theme || campaign.theme })); onClose(); }}>
              Replace current campaign with import
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// THEME PICKER
// ═══════════════════════════════════════════════════════════════════════════════
function ThemePicker({ current, onChange }) {
  const T = useTheme();
  const css = makeCSS(T);
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button style={{ ...css.btn(), fontSize: 11, display: "flex", alignItems: "center", gap: 6 }} onClick={() => setOpen(!open)}>
        <span style={{ width: 8, height: 8, borderRadius: "50%", background: T.accent, display: "inline-block" }} />
        {THEMES[current]?.label || "Theme"} ▾
      </button>
      {open && (
        <div style={{ position: "absolute", top: "110%", right: 0, background: T.surface, border: `1px solid ${T.border}`, borderRadius: T.radius, zIndex: 200, minWidth: 150, boxShadow: "0 4px 20px rgba(0,0,0,0.5)" }}>
          {Object.entries(THEMES).map(([key, theme]) => (
            <div key={key} style={{
              padding: "8px 14px", cursor: "pointer", fontSize: 12, fontFamily: theme.font,
              color: key === current ? theme.accentBright : T.text,
              background: key === current ? T.surface2 : "transparent",
              borderLeft: `3px solid ${key === current ? theme.accentBright : "transparent"}`,
              display: "flex", alignItems: "center", gap: 8,
            }} onClick={() => { onChange(key); setOpen(false); }}>
              <span style={{ width: 10, height: 10, borderRadius: "50%", background: theme.accent, flexShrink: 0 }} />
              {theme.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// Tab items for nav
const NAV_ITEMS = [
  { key: "outline", icon: "☰", label: "Outline" },
  { key: "schema", icon: "⚙", label: "Schema" },
  { key: "flowchart", icon: "◈", label: "Flow" },
  { key: "simulate", icon: "▶", label: "Simulate" },
  { key: "settings", icon: "⚒", label: "Settings" },
];

function App() {
  const [campaign, setCampaign] = useState(null);
  const [selectedPageId, setSelectedPageId] = useState(null);
  const [view, setView] = useState("outline");
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState("saved");
  const [showIO, setShowIO] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => { loadData().then(d => { setCampaign(d ? migrateCampaign(d) : defaultCampaign()); setLoading(false); }); }, []);

  const saveTimer = useRef(null);
  const persist = useCallback((c) => {
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveData(c).then(() => setSaveStatus("saved")), 800);
  }, []);

  const update = useCallback((fn) => {
    setCampaign(prev => { const next = fn(prev); persist(next); return next; });
  }, [persist]);

  if (loading) {
    const isDark = typeof window !== "undefined" && window.matchMedia?.("(prefers-color-scheme: dark)").matches;
    return (
      <div style={{ background: isDark ? "#121212" : "#fafafa", color: isDark ? "#9e9e9e" : "#757575", minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "system-ui, sans-serif", letterSpacing: "0.1em", fontSize: 13 }}>
        Loading…
      </div>
    );
  }

  const T = THEMES[campaign.theme] || THEMES.tactical;
  const css = makeCSS(T);
  const selectedPage = campaign.pages.find(p => p.id === selectedPageId);
  const showSidebar = view === "outline" || view === "editor";
  const mainPad = isMobile ? "12px" : "24px";

  const navigateTo = (v, pageId) => {
    setView(v);
    if (pageId !== undefined) setSelectedPageId(pageId);
    setSidebarOpen(false);
  };

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{ ...css.app, minHeight: "100dvh" }}>

        {/* ── Desktop topbar ── */}
        {!isMobile && (
          <div style={css.topbar}>
            <span style={{ color: T.accentBright, fontSize: 13, fontWeight: "bold", letterSpacing: "0.15em", flexShrink: 0 }}>◈ CAMPAIGN MGR</span>
            <input style={{ ...css.input, width: 180, fontSize: 13 }} value={campaign.name} onChange={e => update(c => ({ ...c, name: e.target.value }))} />
            <div style={{ flex: 1 }} />
            {NAV_ITEMS.map(({ key, label }) => (
              <button key={key} style={{ ...css.btn(view === key ? "primary" : "default"), letterSpacing: "0.06em", fontSize: 11 }}
                onClick={() => navigateTo(key)}>{label.toUpperCase()}</button>
            ))}
            <ThemePicker current={campaign.theme} onChange={k => update(c => ({ ...c, theme: k }))} />
            <button style={{ ...css.btn(), fontSize: 11 }} onClick={() => setShowIO(true)}>⇅ Data</button>
            <span style={{ fontSize: 10, color: T.textMuted, flexShrink: 0 }}>{saveStatus === "saving" ? "●" : "○"} {saveStatus}</span>
          </div>
        )}

        {/* ── Mobile topbar ── */}
        {isMobile && (
          <div style={{ ...css.topbar, height: 52, padding: "0 10px", gap: 6 }}>
            {showSidebar && (
              <button style={{ ...css.btn(), padding: "6px 10px", fontSize: 18, lineHeight: 1, flexShrink: 0 }}
                onClick={() => setSidebarOpen(s => !s)}>☰</button>
            )}
            <span style={{ color: T.accentBright, fontSize: 13, fontWeight: "bold", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {view === "editor" && selectedPage ? selectedPage.name : (NAV_ITEMS.find(n => n.key === view)?.label || view)}
            </span>
            <ThemePicker current={campaign.theme} onChange={k => update(c => ({ ...c, theme: k }))} />
            <button style={{ ...css.btn(), fontSize: 11, padding: "4px 8px", flexShrink: 0 }} onClick={() => setShowIO(true)}>⇅</button>
            <span style={{ fontSize: 9, color: T.textMuted, flexShrink: 0 }}>{saveStatus === "saving" ? "●" : "○"}</span>
          </div>
        )}

        {/* ── Body ── */}
        <div style={{ ...css.body, position: "relative", overflow: isMobile ? "visible" : "hidden" }}>

          {/* Mobile drawer overlay */}
          {isMobile && sidebarOpen && showSidebar && (
            <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex" }}>
              <div style={{ background: "rgba(0,0,0,0.55)", position: "absolute", inset: 0 }}
                onClick={() => setSidebarOpen(false)} />
              <div style={{ position: "relative", zIndex: 1, width: 270, maxWidth: "88vw", height: "100%", overflowY: "auto" }}>
                <Sidebar campaign={campaign} selectedPageId={selectedPageId}
                  onSelect={id => { setSelectedPageId(id); setView("editor"); setSidebarOpen(false); }}
                  onUpdate={update} />
              </div>
            </div>
          )}

          {/* Desktop sidebar */}
          {!isMobile && showSidebar && (
            <Sidebar campaign={campaign} selectedPageId={selectedPageId}
              onSelect={id => navigateTo("editor", id)} onUpdate={update} />
          )}

          <div style={{ ...css.main, padding: mainPad, paddingBottom: isMobile ? "68px" : mainPad, overflowY: "auto" }}>
            {view === "outline" && <OutlineView campaign={campaign} onSelect={id => navigateTo("editor", id)} onUpdate={update} />}
            {view === "editor" && selectedPage && <PageEditor key={selectedPage.id} page={selectedPage} schema={campaign.sectionSchema} onUpdate={p => update(c => ({ ...c, pages: c.pages.map(x => x.id === p.id ? p : x) }))} onBack={() => navigateTo("outline")} />}
            {view === "editor" && !selectedPage && (
              <div style={{ color: T.textDim, textAlign: "center", marginTop: 80 }}>
                {isMobile ? "Tap ☰ to select a page" : "← Select a page to edit"}
              </div>
            )}
            {view === "schema" && <SchemaEditor campaign={campaign} onUpdate={update} />}
            {view === "flowchart" && <FlowchartView campaign={campaign} onUpdate={update} />}
            {view === "simulate" && <SimulatorView campaign={campaign} />}
            {view === "settings" && <SettingsView campaign={campaign} onUpdate={update} onClear={() => { const fresh = defaultCampaign(); setCampaign(fresh); persist(fresh); navigateTo("outline"); }} />}
          </div>
        </div>

        {/* ── Mobile bottom tab bar ── */}
        {isMobile && (
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, height: 56, background: T.surface, borderTop: `1px solid ${T.border}`, display: "flex", zIndex: 200 }}>
            {NAV_ITEMS.map(({ key, icon, label }) => (
              <button key={key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, background: "transparent", border: "none", color: view === key ? T.accent : T.textDim, cursor: "pointer", fontFamily: T.font, padding: "4px 0", position: "relative" }}
                onClick={() => navigateTo(key)}>
                <span style={{ fontSize: 17, lineHeight: 1 }}>{icon}</span>
                <span style={{ fontSize: 9, letterSpacing: "0.05em" }}>{label.toUpperCase()}</span>
                {view === key && <span style={{ position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)", width: 28, height: 2, background: T.accent, borderRadius: "2px 2px 0 0" }} />}
              </button>
            ))}
          </div>
        )}

        {showIO && <ImportExportModal campaign={campaign} onImport={data => { setCampaign(data); persist(data); }} onClose={() => setShowIO(false)} />}
      </div>
    </ThemeCtx.Provider>
  );
}
// ═══════════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════════
function Sidebar({ campaign, selectedPageId, onSelect, onUpdate }) {
  const T = useTheme(); const css = makeCSS(T);
  const [name, setName] = useState("");
  const [type, setType] = useState(campaign.defaultPageType || "mission");
  const [pendingDelete, setPendingDelete] = useState(null);
  useEffect(() => { setType(campaign.defaultPageType || "mission"); }, [campaign.defaultPageType]);

  const add = () => {
    if (!name.trim()) return;
    onUpdate(c => ({ ...c, pages: [...c.pages, { id: uid(), name: name.trim(), type, tags: [], content: "", sections: {}, costs: [], awards: [] }] }));
    setName("");
  };

  return (
    <div style={css.sidebar}>
      <div style={{ padding: "10px 12px", borderBottom: `1px solid ${T.border}` }}>
        <div style={css.label}>Pages</div>
        <input style={{ ...css.input, fontSize: 11, marginBottom: 6 }} placeholder="Page name..." value={name}
          onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
        <div style={{ display: "flex", gap: 4 }}>
          <select style={{ ...css.input, fontSize: 11, flex: 1 }} value={type} onChange={e => setType(e.target.value)}>
            <option value="mission">Mission</option>
            <option value="free">Free Page</option>
          </select>
          <button style={css.btn("primary")} onClick={add}>+</button>
        </div>
      </div>
      <div style={{ flex: 1, overflow: "auto" }}>
        {campaign.pages.length === 0 && <div style={{ padding: 12, color: T.textMuted, fontSize: 11 }}>No pages yet</div>}
        {campaign.pages.map(page => (
          <div key={page.id}>
            <div style={{ padding: "8px 12px", cursor: "pointer", background: selectedPageId === page.id ? T.surface2 : "transparent", borderLeft: `3px solid ${selectedPageId === page.id ? T.accent : "transparent"}`, borderBottom: pendingDelete === page.id ? "none" : `1px solid ${T.border}`, display: "flex", alignItems: "center", gap: 6 }}
              onClick={() => { setPendingDelete(null); onSelect(page.id); }}>
              <span style={{ fontSize: 10, color: page.type === "mission" ? T.accent : T.textDim }}>{page.type === "mission" ? "⬟" : "◻"}</span>
              <span style={{ flex: 1, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{page.name}</span>
              <button style={{ ...css.btn("danger"), padding: "1px 5px", fontSize: 10, opacity: 0.6 }}
                onClick={e => { e.stopPropagation(); setPendingDelete(pendingDelete === page.id ? null : page.id); }}>×</button>
            </div>
            {pendingDelete === page.id && (
              <div style={{ background: T.danger + "22", borderBottom: `1px solid ${T.border}`, padding: "6px 12px", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, color: T.danger, flex: 1 }}>Delete this page?</span>
                <button style={{ ...css.btn("danger"), padding: "2px 8px", fontSize: 10 }} onClick={() => { onUpdate(c => ({ ...c, pages: c.pages.filter(p => p.id !== page.id) })); setPendingDelete(null); }}>Yes</button>
                <button style={{ ...css.btn(), padding: "2px 8px", fontSize: 10 }} onClick={() => setPendingDelete(null)}>No</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// OUTLINE VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function OutlineView({ campaign, onSelect, onUpdate }) {
  const T = useTheme(); const css = makeCSS(T);
  const [filterTag, setFilterTag] = useState("");
  const allTags = [...new Set(campaign.pages.flatMap(p => p.tags || []))];
  const filtered = campaign.pages.filter(p => !filterTag || (p.tags || []).includes(filterTag));

  return (
    <div>
      <div style={{ marginBottom: 12 }}>
        <h2 style={{ margin: "0 0 10px", color: T.accentBright, fontSize: 16, letterSpacing: "0.1em" }}>CAMPAIGN OUTLINE</h2>
        {allTags.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
            <span style={{ fontSize: 10, color: T.textDim, letterSpacing: "0.08em" }}>FILTER:</span>
            <span style={{ ...css.tag, cursor: "pointer", opacity: !filterTag ? 1 : 0.45, outline: !filterTag ? `1px solid ${T.accent}` : "none" }}
              onClick={() => setFilterTag("")}>ALL</span>
            {allTags.map(tag => (
              <span key={tag} style={{ ...css.tag, cursor: "pointer", opacity: filterTag === tag ? 1 : 0.45, outline: filterTag === tag ? `1px solid ${T.accent}` : "none" }}
                onClick={() => setFilterTag(filterTag === tag ? "" : tag)}>{tag}</span>
            ))}
          </div>
        )}
      </div>
      {filtered.length === 0 && (
        <div style={{ color: T.textDim, textAlign: "center", padding: "48px 24px" }}>
          {campaign.pages.length === 0 ? (
            <div>
              <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.3 }}>◈</div>
              <div style={{ fontSize: 15, marginBottom: 8 }}>No pages yet</div>
              <div style={{ fontSize: 12, color: T.textMuted }}>Use the sidebar to add a mission or free page.</div>
            </div>
          ) : <span>No pages match this tag filter.</span>}
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
        {filtered.map(page => <OutlineCard key={page.id} page={page} schema={campaign.sectionSchema} showCosts={campaign.showCostsInOutline !== false} onSelect={onSelect} onUpdate={onUpdate} />)}
      </div>
    </div>
  );
}

function OutlineCard({ page, schema, showCosts, onSelect, onUpdate }) {
  const T = useTheme(); const css = makeCSS(T);
  const [editTag, setEditTag] = useState("");
  const tc = (page.costs || []).reduce((s, c) => s + (Number(c.amount) || 0), 0);
  const ta = (page.awards || []).reduce((s, a) => s + (Number(a.amount) || 0), 0);

  const addTag = () => {
    const t = editTag.trim().toLowerCase();
    if (!t || (page.tags || []).includes(t)) { setEditTag(""); return; }
    onUpdate(c => ({ ...c, pages: c.pages.map(p => p.id === page.id ? { ...p, tags: [...(p.tags || []), t] } : p) }));
    setEditTag("");
  };

  return (
    <div style={{ ...css.section, cursor: "pointer", transition: "border-color 0.15s" }}
      onMouseEnter={e => e.currentTarget.style.borderColor = T.accent}
      onMouseLeave={e => e.currentTarget.style.borderColor = T.border}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }} onClick={() => onSelect(page.id)}>
        <span style={{ fontSize: 10, color: page.type === "mission" ? T.accent : T.textDim }}>{page.type === "mission" ? "⬟ MISSION" : "◻ PAGE"}</span>
        <span style={{ flex: 1, fontWeight: "bold", fontSize: 14, color: T.accentBright }}>{page.name}</span>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
        {(page.tags || []).map(tag => (
          <span key={tag} style={{ ...css.tag, cursor: "pointer" }}
            onClick={() => onUpdate(c => ({ ...c, pages: c.pages.map(p => p.id === page.id ? { ...p, tags: p.tags.filter(t => t !== tag) } : p) }))}>{tag} ×</span>
        ))}
        <input style={{ ...css.input, width: 80, fontSize: 10, padding: "1px 5px" }} placeholder="+ tag" value={editTag}
          onChange={e => setEditTag(e.target.value)}
          onKeyDown={e => { e.stopPropagation(); if (e.key === "Enter") addTag(); }}
          onClick={e => e.stopPropagation()} />
      </div>
      {page.type === "mission" && (
        <div style={{ fontSize: 11 }} onClick={() => onSelect(page.id)}>
          {schema.map(sec => (
            <div key={sec.id} style={{ marginBottom: 6 }}>
              <div style={{ color: T.textDim, marginBottom: 3, fontSize: 10, letterSpacing: "0.06em" }}>▸ {sec.name.toUpperCase()}</div>
              {sec.subheaders.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, paddingLeft: 8 }}>
                  {sec.subheaders.map(sh => (
                    <span key={sh} style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, color: T.textDim, fontSize: 9, padding: "1px 6px", letterSpacing: "0.04em" }}>{sh}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
      {showCosts && (tc > 0 || ta > 0) && (
        <div style={{ display: "flex", gap: 12, marginTop: 8, fontSize: 11 }}>
          {tc > 0 && <span style={{ color: T.danger }}>▼ {tc.toLocaleString()}</span>}
          {ta > 0 && <span style={{ color: T.accent }}>▲ {ta.toLocaleString()}</span>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAGE EDITOR
// ═══════════════════════════════════════════════════════════════════════════════
function PageEditor({ page, schema, onUpdate, onBack }) {
  const T = useTheme(); const css = makeCSS(T);
  const isMobile = useIsMobile();
  const [activeSection, setActiveSection] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [editTag, setEditTag] = useState("");
  const imgRef = useRef(null);
  const [imgTarget, setImgTarget] = useState(null);

  const set = (k, v) => onUpdate({ ...page, [k]: v });
  const setSection = (sid, v) => onUpdate({ ...page, sections: { ...page.sections, [sid]: v } });

  const addTag = () => {
    const t = editTag.trim().toLowerCase();
    if (!t || (page.tags || []).includes(t)) { setEditTag(""); return; }
    set("tags", [...(page.tags || []), t]); setEditTag("");
  };

  const handleImg = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      const md = `\n![${file.name}](${ev.target.result})\n`;
      if (imgTarget === "free") set("content", (page.content || "") + md);
      else if (imgTarget) setSection(imgTarget, (page.sections[imgTarget] || "") + md);
    };
    r.readAsDataURL(file); e.target.value = "";
  };

  const triggerImg = (t) => { setImgTarget(t); setTimeout(() => imgRef.current?.click(), 50); };

  return (
    <div style={{ maxWidth: 860 }}>
      {isMobile && onBack && (
        <button style={{ ...css.btn(), marginBottom: 12, fontSize: 12, display: "inline-flex", alignItems: "center", gap: 4 }} onClick={onBack}>← Outline</button>
      )}
      <input style={{ ...css.input, fontSize: "clamp(16px, 4vw, 20px)", fontWeight: "bold", marginBottom: 12, color: T.accentBright, maxWidth: "100%", boxSizing: "border-box" }} value={page.name} onChange={e => set("name", e.target.value)} />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16, alignItems: "center" }}>
        <span style={{ ...css.label, margin: 0 }}>Tags:</span>
        {(page.tags || []).map(tag => <span key={tag} style={{ ...css.tag, cursor: "pointer" }} onClick={() => set("tags", page.tags.filter(t => t !== tag))}>{tag} ×</span>)}
        <input style={{ ...css.input, width: 100, fontSize: 11, padding: "2px 6px" }} placeholder="+ add tag" value={editTag}
          onChange={e => setEditTag(e.target.value)} onKeyDown={e => e.key === "Enter" && addTag()} />
      </div>
      <input ref={imgRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleImg} />

      {page.type === "free" && (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <button style={css.btn(editMode ? "primary" : "default")} onClick={() => setEditMode(!editMode)}>{editMode ? "Preview" : "Edit"}</button>
            <button style={css.btn()} onClick={() => triggerImg("free")}>⬆ Image</button>
          </div>
          {editMode
            ? <textarea style={{ ...css.textarea, minHeight: 400 }} value={page.content || ""} onChange={e => set("content", e.target.value)} placeholder="Markdown supported..." />
            : <div style={css.section} dangerouslySetInnerHTML={{ __html: renderMarkdown(page.content, T) }} />}
        </div>
      )}

      {page.type === "mission" && (
        <div>
          <div style={{ display: "flex", gap: 4, marginBottom: 16, overflowX: "auto", paddingBottom: 4, WebkitOverflowScrolling: "touch", scrollbarWidth: "none" }}>
            <button style={{ ...css.btn(activeSection === null ? "primary" : "default"), fontSize: 11, flexShrink: 0 }}
              onClick={() => setActiveSection(null)}>All</button>
            {schema.map(sec => (
              <button key={sec.id} style={{ ...css.btn(activeSection === sec.id ? "primary" : "default"), fontSize: 11, flexShrink: 0 }}
                onClick={() => setActiveSection(activeSection === sec.id ? null : sec.id)}>{sec.name}</button>
            ))}
            <button style={{ ...css.btn(activeSection === "__costs" ? "primary" : "default"), fontSize: 11, flexShrink: 0 }}
              onClick={() => setActiveSection(activeSection === "__costs" ? null : "__costs")}>Costs / Awards</button>
          </div>
          {activeSection === null && schema.map(sec => (
            <MissionSection key={sec.id} sec={sec} value={page.sections[sec.id] || ""}
              onChange={v => setSection(sec.id, v)} onImageUpload={() => triggerImg(sec.id)} />
          ))}
          {activeSection !== null && activeSection !== "__costs" && (() => {
            const sec = schema.find(s => s.id === activeSection);
            return sec ? <MissionSection sec={sec} value={page.sections[sec.id] || ""} onChange={v => setSection(sec.id, v)} onImageUpload={() => triggerImg(sec.id)} expanded /> : null;
          })()}
          {activeSection === "__costs" && (
            <CostsAwards
              costs={page.costs || []} awards={page.awards || []}
              onAddCost={() => set("costs", [...(page.costs || []), { id: uid(), label: "", amount: 0 }])}
              onAddAward={() => set("awards", [...(page.awards || []), { id: uid(), label: "", amount: 0 }])}
              onUpdateCost={(id, f, v) => set("costs", page.costs.map(c => c.id === id ? { ...c, [f]: v } : c))}
              onUpdateAward={(id, f, v) => set("awards", page.awards.map(a => a.id === id ? { ...a, [f]: v } : a))}
              onRemoveCost={id => set("costs", page.costs.filter(c => c.id !== id))}
              onRemoveAward={id => set("awards", page.awards.filter(a => a.id !== id))}
            />
          )}
        </div>
      )}
    </div>
  );
}

function MissionSection({ sec, value, onChange, onImageUpload, expanded }) {
  const T = useTheme(); const css = makeCSS(T);
  // Default to edit mode when section is empty
  const [editMode, setEditMode] = useState(!value);
  return (
    <div style={{ ...css.section, marginBottom: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <span style={{ color: T.accentBright, fontWeight: "bold", fontSize: 13, letterSpacing: "0.1em" }}>{sec.name.toUpperCase()}</span>
        {sec.subheaders.map(sh => <span key={sh} style={{ fontSize: 10, color: T.textDim, background: T.surface2, padding: "1px 6px", borderRadius: T.radius }}>{sh}</span>)}
        <div style={{ flex: 1 }} />
        <button style={{ ...css.btn(), fontSize: 10 }} onClick={onImageUpload}>⬆</button>
        <button style={css.btn(editMode ? "primary" : "default")} onClick={() => setEditMode(!editMode)}>{editMode ? "Preview" : "Edit"}</button>
      </div>
      {sec.subheaders.length > 0 && editMode && <div style={{ marginBottom: 6, fontSize: 10, color: T.textMuted }}>Suggested: {sec.subheaders.map(sh => `### ${sh}`).join("  ")}</div>}
      {editMode
        ? <textarea style={{ ...css.textarea, minHeight: expanded ? 350 : 180 }} value={value} onChange={e => onChange(e.target.value)} placeholder={`## ${sec.name}\n${sec.subheaders.map(sh => `### ${sh}\n\n`).join("")}`} />
        : <div style={{ minHeight: 40, color: value ? T.text : T.textMuted, fontSize: 13 }} dangerouslySetInnerHTML={{ __html: value ? renderMarkdown(value, T) : `<em>${sec.name} — click Edit to add content</em>` }} />}
    </div>
  );
}

function CostsAwards({ costs, awards, onAddCost, onAddAward, onUpdateCost, onUpdateAward, onRemoveCost, onRemoveAward }) {
  const T = useTheme(); const css = makeCSS(T);
  const tc = costs.reduce((s, c) => s + (Number(c.amount) || 0), 0);
  const ta = awards.reduce((s, a) => s + (Number(a.amount) || 0), 0);
  const sections = [
    { key: "costs", label: "COSTS", sign: "▼", color: T.danger, items: costs, onAdd: onAddCost, onUpdate: onUpdateCost, onRemove: onRemoveCost, total: tc },
    { key: "awards", label: "AWARDS", sign: "▲", color: T.accent, items: awards, onAdd: onAddAward, onUpdate: onUpdateAward, onRemove: onRemoveAward, total: ta },
  ];
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
        {sections.map(({ key, label, sign, color, items, onAdd, onUpdate, onRemove, total }) => (
          <div key={key} style={css.section}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ color, fontWeight: "bold", fontSize: 12, letterSpacing: "0.1em" }}>{sign} {label}</span>
              <button style={css.btn()} onClick={onAdd}>+ Add</button>
            </div>
            {items.map(item => (
              <div key={item.id} style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                <input style={{ ...css.input, flex: 2, fontSize: 11 }} placeholder="Label" value={item.label} onChange={e => onUpdate(item.id, "label", e.target.value)} />
                <input style={{ ...css.input, flex: 1, fontSize: 11 }} type="number" placeholder="Amount" value={item.amount} onChange={e => onUpdate(item.id, "amount", e.target.value)} />
                <button style={{ ...css.btn("danger"), padding: "2px 6px" }} onClick={() => onRemove(item.id)}>×</button>
              </div>
            ))}
            {items.length > 0 && <div style={{ textAlign: "right", color, fontSize: 12, marginTop: 6 }}>Total: {total.toLocaleString()}</div>}
          </div>
        ))}
      </div>
      {(tc > 0 || ta > 0) && (
        <div style={{ textAlign: "right", fontSize: 12, color: ta - tc >= 0 ? T.accent : T.danger, paddingTop: 4 }}>
          Net: {(ta - tc).toLocaleString()} C-Bills
        </div>
      )}
    </div>
  );
}

function SchemaEditor({ campaign, onUpdate }) {
  const T = useTheme(); const css = makeCSS(T);
  const add = () => onUpdate(c => ({ ...c, sectionSchema: [...c.sectionSchema, { id: uid(), name: "New Section", subheaders: [] }] }));
  const upd = (id, f, v) => onUpdate(c => ({ ...c, sectionSchema: c.sectionSchema.map(s => s.id === id ? { ...s, [f]: v } : s) }));
  const del = (id) => onUpdate(c => ({ ...c, sectionSchema: c.sectionSchema.filter(s => s.id !== id) }));
  const move = (id, d) => onUpdate(c => {
    const arr = [...c.sectionSchema]; const i = arr.findIndex(s => s.id === id); const j = i + d;
    if (j < 0 || j >= arr.length) return c;
    [arr[i], arr[j]] = [arr[j], arr[i]]; return { ...c, sectionSchema: arr };
  });

  return (
    <div style={{ maxWidth: 640 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: T.accentBright, fontSize: 16, letterSpacing: "0.1em" }}>SECTION SCHEMA</h2>
        <span style={{ fontSize: 11, color: T.textDim }}>— applies to all Mission pages</span>
        <div style={{ flex: 1 }} />
        <button style={css.btn("primary")} onClick={add}>+ Section</button>
      </div>
      <div style={{ marginBottom: 12, padding: 10, background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, fontSize: 11, color: T.textDim }}>
        Changes here propagate to all mission pages automatically. Existing section content is preserved.
      </div>
      {campaign.sectionSchema.map((sec, i) => <SchemaSectionRow key={sec.id} sec={sec} isFirst={i === 0} isLast={i === campaign.sectionSchema.length - 1} onChange={(f, v) => upd(sec.id, f, v)} onRemove={() => del(sec.id)} onMove={d => move(sec.id, d)} />)}
      {campaign.sectionSchema.length === 0 && <div style={{ color: T.textDim, textAlign: "center", padding: 32 }}>No sections defined. Mission pages will be free-form.</div>}
    </div>
  );
}

function SchemaSectionRow({ sec, isFirst, isLast, onChange, onRemove, onMove }) {
  const T = useTheme(); const css = makeCSS(T);
  const [sub, setSub] = useState("");
  const addSub = () => { const s = sub.trim(); if (!s || sec.subheaders.includes(s)) { setSub(""); return; } onChange("subheaders", [...sec.subheaders, s]); setSub(""); };
  return (
    <div style={{ ...css.section, marginBottom: 10 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
          <button style={{ ...css.btn(), padding: "1px 5px", fontSize: 10 }} disabled={isFirst} onClick={() => onMove(-1)}>▲</button>
          <button style={{ ...css.btn(), padding: "1px 5px", fontSize: 10 }} disabled={isLast} onClick={() => onMove(1)}>▼</button>
        </div>
        <input style={{ ...css.input, fontWeight: "bold", color: T.accentBright, flex: 1 }} value={sec.name} onChange={e => onChange("name", e.target.value)} />
        <button style={css.btn("danger")} onClick={onRemove}>Remove</button>
      </div>
      <div style={css.label}>Subheaders:</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 6 }}>
        {sec.subheaders.map(sh => <span key={sh} style={{ ...css.tag, cursor: "pointer" }} onClick={() => onChange("subheaders", sec.subheaders.filter(s => s !== sh))}>{sh} ×</span>)}
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <input style={{ ...css.input, fontSize: 11, flex: 1 }} placeholder="Add subheader..." value={sub} onChange={e => setSub(e.target.value)} onKeyDown={e => e.key === "Enter" && addSub()} />
        <button style={css.btn()} onClick={addSub}>+</button>
      </div>
    </div>
  );
}

const NW = 180, NH = 72;

// ─── Edge event helpers ────────────────────────────────────────────────────────
function emptyEvent() {
  return { id: uid(), description: "", probability: 100, requiresKeyword: "", grantsKeyword: "", costMin: 0, costMax: 0, awardMin: 0, awardMax: 0 };
}

function EdgeEventEditor({ events, onChange, T, css }) {
  const add = () => onChange([...events, emptyEvent()]);
  const upd = (id, field, val) => onChange(events.map(ev => ev.id === id ? { ...ev, [field]: val } : ev));
  const del = (id) => onChange(events.filter(ev => ev.id !== id));

  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontSize: 11, color: T.accent, fontWeight: "bold", letterSpacing: "0.08em" }}>EDGE EVENTS</span>
        <button style={{ ...css.btn(), fontSize: 10, padding: "2px 8px" }} onClick={add}>+ Add Event</button>
      </div>
      <div style={{ fontSize: 10, color: T.textDim, marginBottom: 8 }}>
        Events fire when the party takes this path. Costs/awards use random values in the given range.
      </div>
      {events.map(ev => (
        <div key={ev.id} style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: T.radius, padding: 10, marginBottom: 8 }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
            <input style={{ ...css.input, flex: 1, fontSize: 11 }} placeholder="Description (e.g. 'Mech destroyed')" value={ev.description} onChange={e => upd(ev.id, "description", e.target.value)} />
            <button style={{ ...css.btn("danger"), padding: "2px 6px", fontSize: 10 }} onClick={() => del(ev.id)}>×</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
            <div>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 2 }}>PROBABILITY %</div>
              <input type="number" min="0" max="100" style={{ ...css.input, fontSize: 11 }} value={ev.probability} onChange={e => upd(ev.id, "probability", Math.min(100, Math.max(0, Number(e.target.value))))} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: T.textDim, marginBottom: 2 }}>REQUIRES KEYWORD</div>
              <input style={{ ...css.input, fontSize: 11 }} placeholder="e.g. veteran_salvagers" value={ev.requiresKeyword} onChange={e => upd(ev.id, "requiresKeyword", e.target.value)} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: T.danger, marginBottom: 2 }}>COST MIN → MAX</div>
              <div style={{ display: "flex", gap: 4 }}>
                <input type="number" style={{ ...css.input, fontSize: 11 }} placeholder="0" value={ev.costMin} onChange={e => upd(ev.id, "costMin", Number(e.target.value))} />
                <input type="number" style={{ ...css.input, fontSize: 11 }} placeholder="0" value={ev.costMax} onChange={e => upd(ev.id, "costMax", Number(e.target.value))} />
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: T.accent, marginBottom: 2 }}>AWARD MIN → MAX</div>
              <div style={{ display: "flex", gap: 4 }}>
                <input type="number" style={{ ...css.input, fontSize: 11 }} placeholder="0" value={ev.awardMin} onChange={e => upd(ev.id, "awardMin", Number(e.target.value))} />
                <input type="number" style={{ ...css.input, fontSize: 11 }} placeholder="0" value={ev.awardMax} onChange={e => upd(ev.id, "awardMax", Number(e.target.value))} />
              </div>
            </div>
          </div>
          <div>
            <div style={{ fontSize: 9, color: T.textDim, marginBottom: 2 }}>GRANTS KEYWORD</div>
            <input style={{ ...css.input, fontSize: 11 }} placeholder="e.g. hero_of_steiner" value={ev.grantsKeyword} onChange={e => upd(ev.id, "grantsKeyword", e.target.value)} />
          </div>
        </div>
      ))}
      {events.length === 0 && <div style={{ fontSize: 10, color: T.textMuted, textAlign: "center", padding: "8px 0" }}>No events — add one above</div>}
